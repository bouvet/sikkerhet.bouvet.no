name: Update checklist dates

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set Git user identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Detect changes and update both checklist files
        run: |
          FILES=("content/en/checklist.md" "content/no/sjekklisten.md")

          # Compare current PR HEAD against the PR base branch merge-base.
          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          MERGE_BASE=$(git merge-base HEAD "$BASE_REF")

          # If either checklist changed anywhere in the PR, update both.
          if git diff --quiet "$MERGE_BASE"..HEAD -- "${FILES[@]}"; then
            echo "No checklist changes detected, skipping timestamp update."
          else
            LAST_MODIFIED=$(date +'%Y.%m.%d')
            for FILE in "${FILES[@]}"; do
              echo "Updating $FILE"
              sed -i -E "s/^(Last modified:|Sist oppdatert:).*/\1 $LAST_MODIFIED/" "$FILE"
              git add "$FILE"
            done
          fi
          
          # Commit if staged changes exist
          if git commit -m "Update last modified dates in checklist"; then
            git push origin HEAD
          else
            echo "No changes to commit; skipping push."
          fi
